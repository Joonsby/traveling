name: Deploy WAR

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop containers before build
        run: |
          cd /home/ubuntu/apps/traveling
          docker compose down || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR
        run: MAVEN_OPTS="-Xmx512m" mvn clean package -DskipTests

      - name: Copy WAR
        run: |
          mkdir -p /home/ubuntu/apps/traveling/deploy
          cp target/*.war /home/ubuntu/apps/traveling/deploy/ROOT.war

      - name: Deploy with Docker Compose
        run: |
          cd /home/ubuntu/apps/traveling
          docker compose up -d --build
          docker compose ps