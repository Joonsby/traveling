name: Deploy Docker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync project files
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            ./ /home/ubuntu/apps/traveling/

      - name: Deploy with Docker Compose
        run: |
          cd /home/ubuntu/apps/traveling
          docker compose down || true
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Show logs
        run: |
          cd /home/ubuntu/apps/traveling
          docker compose logs --tail=100 tomcat
          docker compose logs --tail=100 flyway