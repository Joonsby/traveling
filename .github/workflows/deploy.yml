name: Deploy Dynamic Web Project

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '배포할 브랜치 선택 (dev / main)'
        required: true
        default: 'dev'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set deploy environment
        run: |
          if [ "${{ github.event.inputs.branch }}" = "dev" ]; then
            echo "DEPLOY_PATH=/home/ubuntu/tomcat-dev/webapps" >> $GITHUB_ENV
            echo "TOMCAT_SERVICE=tomcat-dev" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.branch }}" = "main" ]; then
            echo "DEPLOY_PATH=/home/ubuntu/tomcat-prd/webapps" >> $GITHUB_ENV
            echo "TOMCAT_SERVICE=tomcat-prd" >> $GITHUB_ENV
          fi

      - name: Prepare WAR structure
        run: |
          mkdir -p build/WEB-INF/classes
          mkdir -p build/WEB-INF/lib

          cp -r traveling_project/WebContent/* build/

          find traveling_project/src -name "*.java" > sources.txt

          javac -encoding UTF-8 \
            -cp "traveling_project/WebContent/WEB-INF/lib/*" \
            -d build/WEB-INF/classes \
            @sources.txt

          cd build
          jar -cvf ../ROOT.war .

      - name: Upload ROOT.war to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: ROOT.war
          target: /tmp

      - name: Deploy to Tomcat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo systemctl stop ${{ env.TOMCAT_SERVICE }}

            sudo rm -rf ${{ env.DEPLOY_PATH }}/ROOT
            sudo rm -f ${{ env.DEPLOY_PATH }}/ROOT.war

            sudo mv /tmp/ROOT.war ${{ env.DEPLOY_PATH }}/ROOT.war
            sudo chown ubuntu:ubuntu ${{ env.DEPLOY_PATH }}/ROOT.war

            sudo systemctl start ${{ env.TOMCAT_SERVICE }}
